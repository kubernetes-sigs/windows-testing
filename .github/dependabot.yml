version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    # Group action updates together for easier review
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
