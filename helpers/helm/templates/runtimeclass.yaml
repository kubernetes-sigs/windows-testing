{{- if and (eq .Values.webhookType "hyperv") .Values.runtimeClass.enabled }}
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .Values.runtimeClass.name }}
  labels:
    {{- include "webhook.labels" . | nindent 4 }}
handler: {{ .Values.runtimeClass.handler }}
{{- with .Values.runtimeClass.overhead }}
overhead:
  podFixed:
    {{- toYaml .podFixed | nindent 4 }}
{{- end }}
{{- with .Values.runtimeClass.scheduling }}
scheduling:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
