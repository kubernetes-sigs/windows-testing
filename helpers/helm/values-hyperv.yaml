# Values for deploying Hyper-V mutating webhook
# Usage: helm install hyperv-webhook ./helm -f values-hyperv.yaml
#
# Override registry and version via environment variables:
#   helm install hyperv-webhook ./helm -f values-hyperv.yaml \
#     --set deployment.image.registry=$REGISTRY \
#     --set deployment.image.tag=$VERSION

webhookType: hyperv

deployment:
  image:
    repository: sigwindowstools/hyperv-runtimeclass-mutating-webhook
    tag: ""  # Uses chart appVersion by default, override with --set deployment.image.tag=$VERSION

  # controller-runtime manages TLS and flags internally, no args needed
  args: []

  # controller-runtime default cert directory
  certMountPath: /tmp/k8s-webhook-server/serving-certs

  service:
    targetPort: 9443

  # controller-runtime serves health checks on a separate HTTP port
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
      scheme: HTTP
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
      scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3

webhookConfiguration:
  path: /mutate-v1-pod
  objectSelector: {}

# RuntimeClass configuration for Hyper-V
runtimeClass:
  enabled: true
  name: runhcs-wcow-hypervisor
  handler: runhcs-wcow-hypervisor

  # Pod overhead accounts for the Hyper-V Utility VM (UVM) resource consumption
  # on the host. Each Hyper-V isolated container runs inside a UVM which consumes
  # host memory and CPU beyond what the container itself requests. Without this,
  # the scheduler over-commits nodes and the eviction manager cannot correctly
  # attribute memory pressure to Hyper-V pods.
  #
  # KEP-688: https://github.com/kubernetes/enhancements/blob/master/keps/sig-node/688-pod-overhead/README.md
  # Kubernetes automatically injects these values into pod.spec.overhead when
  # a pod uses this RuntimeClass (via the built-in RuntimeClass admission controller).
  overhead:
    podFixed:
      memory: "512Mi"
      cpu: "100m"

  # Scheduling constraints ensure pods using this RuntimeClass are only
  # scheduled to Windows nodes that support Hyper-V isolation.
  scheduling:
    nodeSelector:
      kubernetes.io/os: windows
      kubernetes.io/arch: amd64


